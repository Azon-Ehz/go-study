syntax = "proto3";

option go_package = ".:import_proto";
import "base.proto";

//官方全局通用message 比如 empty占位用的 空 message
//import "google/protobuf/empty.proto";
//rpc Ping(google.protobuf.Empty) returns(Pong)
//而其生成的pb.go 可以在empty.proto中的 go_package中找到
//如果有地方要调用它 可以通过import直接调用


service Greeter {
    rpc SayHello (HelloRequest) returns (HelloResponse)
    rpc Ping(Empty) returns(Pong)
}

message HelloRequest {
    string name  =  1;
    string age  =  2;

}
message HelloResponse {
    string reply  =  1;
}